server {
    listen 80;
    server_name localhost;

    # Ensure .mjs (ES module) files are served with the correct MIME type.
    # Without this nginx falls back to application/octet-stream which browsers
    # reject for module scripts — breaking pdf.js worker loading.
    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html htm;
        image/svg+xml           svg svgz;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/gif               gif;
        image/webp              webp;
        image/x-icon            ico;
        font/woff               woff;
        font/woff2              woff2;
        application/json        json;
        application/manifest+json  webmanifest;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Serve hashed JS/CSS assets with long-lived cache
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Backend API proxy
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Allow large PDF responses from backend
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        proxy_read_timeout         120s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # API documentation
    location /docs {
        proxy_pass http://backend:8000/docs;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}
