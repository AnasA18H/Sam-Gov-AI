# DigitalOcean App Platform Specification
# This file defines the multi-component app: Backend, Worker, and Frontend.

name: sam-gov-ai
region: nyc
domains:
  - domain: www.GovOpsAi.com
    type: PRIMARY
services:
  - name: backend
    instance_count: 1
    instance_size_slug: basic-xs
    dockerfile_path: Dockerfile.backend
    http_port: 8000
    source_dir: /
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_CELERY_URL
        scope: RUN_AND_BUILD_TIME
        value: ${redis.REDIS_URL}
      - key: STORAGE_TYPE
        scope: RUN_TIME
        value: s3
      - key: AWS_REGION
        scope: RUN_TIME
        value: sfo3
      - key: S3_BUCKET_NAME
        scope: RUN_TIME
        value: samgov-docs
      - key: AWS_S3_ENDPOINT_URL
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
      - key: AWS_ACCESS_KEY_ID
        scope: RUN_TIME
        value: DO009ZPCEUGGUTVJBKZ6
      - key: AWS_SECRET_ACCESS_KEY
        scope: RUN_TIME
        value: "Aew/2MUkMYP7cst7kmjSIWGoVhZNl+Hu/v8SoWsyCHA"
      # Add other secrets (Anthropic, etc.) in the DO UI or via doctl
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10

  - name: frontend
    instance_count: 1
    instance_size_slug: basic-xxs
    dockerfile_path: Dockerfile.frontend
    http_port: 80
    source_dir: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}

workers:
  - name: celery-worker
    instance_count: 1
    instance_size_slug: basic-xs
    dockerfile_path: Dockerfile.backend
    run_command: celery -A backend.app.core.celery_app worker --loglevel=info
    source_dir: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_CELERY_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: STORAGE_TYPE
        scope: RUN_TIME
        value: s3
      - key: AWS_REGION
        scope: RUN_TIME
        value: sfo3
      - key: S3_BUCKET_NAME
        scope: RUN_TIME
        value: samgov-docs
      - key: AWS_S3_ENDPOINT_URL
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
      - key: AWS_ACCESS_KEY_ID
        scope: RUN_TIME
        value: DO009ZPCEUGGUTVJBKZ6
      - key: AWS_SECRET_ACCESS_KEY
        scope: RUN_TIME
        value: "Aew/2MUkMYP7cst7kmjSIWGoVhZNl+Hu/v8SoWsyCHA"

databases:
  - name: db
    engine: PG
    production: true # Use a managed DB for production
  - name: redis
    engine: REDIS
    production: true

# Pre-deploy job for migrations
jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    instance_size_slug: basic-xxs
    dockerfile_path: Dockerfile.backend
    run_command: alembic upgrade head
    source_dir: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
