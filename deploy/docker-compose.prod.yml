services:
  redis:
    image: redis:7-alpine
    container_name: samgov_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - samgov_network

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: samgov_backend
    env_file:
      - .env.prod
    environment:
      - DEBUG=False
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CELERY_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
      - ./secrets:/run/secrets:ro
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - samgov_network

  celery:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: samgov_celery
    command: celery -A backend.app.core.celery_app worker --loglevel=info
    env_file:
      - .env.prod
    environment:
      - DEBUG=False
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CELERY_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
      - ./secrets:/run/secrets:ro
    restart: unless-stopped
    networks:
      - samgov_network

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: samgov_frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - samgov_network

  caddy:
    image: caddy:2-alpine
    container_name: samgov_caddy
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - samgov_network

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  samgov_network:
    driver: bridge
